name: Docs

on:
  push:
    branches: [ main ]
    # Only rebuild when something that affects the site changes.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "autonmt/**"          # API reference is autogenerated from docstrings
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel an in-flight one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install docs dependencies
        # The package is installed so mkdocstrings can import autonmt for the
        # API reference. CPU-only torch keeps the install fast on CI.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[docs]'

      - name: Build site
        # Not --strict: mkdocstrings can emit cross-reference warnings from
        # docstrings that shouldn't block a deploy. Run `mkdocs build --strict`
        # locally to surface broken internal links before pushing.
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
