site_name: AutoNMT
site_description: A framework to streamline the research of neural machine translation models.
site_author: Salva Carrión
site_url: https://salvacarrion.github.io/autonmt/

repo_name: salvacarrion/autonmt
repo_url: https://github.com/salvacarrion/autonmt
edit_uri: edit/main/docs/

copyright: Copyright &copy; Salva Carrión — MIT License

theme:
  name: material
  logo: images/logos/logo.png
  favicon: images/logos/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Introduction:
      - Why AutoNMT: introduction/why.md
      - Design philosophy: introduction/philosophy.md
      - The mental model: introduction/mental-model.md
  - Get started:
      - Installation: get-started/installation.md
      - Your first experiment: get-started/first-experiment.md
  - Architecture:
      - Building blocks & the pipeline: architecture/building-blocks.md
      - The toolkit abstraction: architecture/toolkit-abstraction.md
      - On-disk layout & reproducibility: architecture/layout-and-reproducibility.md
  - Data & vocabularies:
      - Datasets & the dataset builder: data/dataset-builder.md
      - Preprocessing & subword encoding: data/preprocessing-and-encoding.md
      - Vocabularies: data/vocabularies.md
  - The AutoNMT toolkit:
      - Overview & the experiment loop: toolkit/overview.md
      - Training (fit): toolkit/training.md
      - Translating & decoding (predict): toolkit/predict.md
      - Models & the LitSeq2Seq contract: toolkit/models.md
      - Decoding strategies: toolkit/decoding.md
      - Samplers & the TranslationDataset: toolkit/data-pipeline.md
      - Full manual control: toolkit/manual-control.md
  - Backends:
      - Choosing a backend: backends/index.md
      - HuggingFace: backends/huggingface.md
      - Fairseq (deprecated): backends/fairseq.md
  - Evaluation & reports:
      - Metrics & significance: evaluation/metrics.md
      - Reports & plots: evaluation/reports.md
  - Extending AutoNMT: extending/index.md
  - API reference:
      - Overview: reference/index.md
      - Datasets: reference/datasets.md
      - Vocabularies: reference/vocabularies.md
      - Backends: reference/backends.md
      - Models & decoding: reference/core.md
      - Evaluation: reference/evaluation.md
      - Reporting: reference/reporting.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator:
        !!python/name:material.extensions.emoji.to_svg # Keep the archived docs out of the built site (kept in-repo for reference only).


exclude_docs: |
  _legacy/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_if_no_docstring: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/salvacarrion/autonmt

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
