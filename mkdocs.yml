site_name: AutoNMT
site_description: A framework to streamline the research of neural machine translation models.
site_author: Salva Carrión
site_url: https://salvacarrion.github.io/autonmt/

repo_name: salvacarrion/autonmt
repo_url: https://github.com/salvacarrion/autonmt
edit_uri: edit/main/docs/

copyright: Copyright &copy; Salva Carrión — MIT License

theme:
  name: material
  logo: images/logos/logo.png
  favicon: images/logos/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Get started:
      - Installation: get-started/installation.md
      - "Quickstart: your first experiment": get-started/quickstart.md
      - Understanding the output: get-started/understanding-the-output.md
  - User guide:
      - Experiments:
          - The experiment workflow: guide/experiments/workflow.md
          - Configuration & reproducibility: guide/experiments/configuration.md
      - Data:
          - Datasets & the builder: guide/data/datasets.md
          - Preprocessing: guide/data/preprocessing.md
          - Subword tokenization: guide/data/tokenization.md
          - Vocabularies: guide/data/vocabularies.md
      - Models:
          - Using a model: guide/models/using-a-model.md
          - Model catalog: guide/models/catalog.md
          - Building blocks: guide/models/building-blocks.md
          - Writing your own model: guide/models/custom-models.md
      - Training:
          - Training a model: guide/training/training.md
          - Validation & checkpoints: guide/training/validation-checkpoints.md
          - Bucketing & batching: guide/training/bucketing.md
          - Advanced training control: guide/training/advanced.md
      - Translation:
          - Generating translations: guide/translation/generating.md
          - Decoding strategies: guide/translation/decoding.md
      - Evaluation:
          - Metrics: guide/evaluation/metrics.md
          - Statistical significance: guide/evaluation/significance.md
          - Reports & plots: guide/evaluation/reports.md
      - Toolkits & backends:
          - Choosing a backend: guide/backends/choosing.md
          - Native (PyTorch Lightning): guide/backends/native.md
          - HuggingFace: guide/backends/huggingface.md
          - Fairseq (deprecated): guide/backends/fairseq.md
  - How-to guides:
      - how-to/index.md
      - Run a complete experiment: how-to/complete-experiment.md
      - Compare multiple models: how-to/compare-models.md
      - Use a custom dataset: how-to/custom-dataset.md
      - Run with another backend: how-to/swap-backend.md
      - Reproduce an experiment: how-to/reproduce.md
      - Add a custom model: how-to/custom-model.md
      - Change the decoding strategy: how-to/custom-decoding.md
      - Add a custom metric: how-to/custom-metric.md
      - Drive the pipeline manually: how-to/manual-pipeline.md
  - Concepts:
      - Design philosophy: concepts/philosophy.md
      - The mental model: concepts/mental-model.md
      - Architecture: concepts/architecture.md
      - On-disk layout: concepts/on-disk-layout.md
      - Reproducibility model: concepts/reproducibility.md
  - API reference:
      - reference/index.md
      - Datasets: reference/datasets.md
      - Vocabularies: reference/vocabularies.md
      - Backends: reference/backends.md
      - Core: reference/core.md
      - Evaluation: reference/evaluation.md
      - Reporting: reference/reporting.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator:
        !!python/name:material.extensions.emoji.to_svg # Keep the archived docs out of the built site (kept in-repo for reference only).


exclude_docs: |
  _legacy/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_if_no_docstring: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/salvacarrion/autonmt

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
